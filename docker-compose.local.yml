# Local development compose file — HTTP only, no SSL certs required.
# Usage: docker-compose -f docker-compose.local.yml up --build
# App runs at http://localhost:3000
#
# Do NOT use this file on the EC2 server. Use docker-compose.yml (production) there.

version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: flight-delay-backend

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: flight-delay-frontend
    ports:
      - "3000:80"
    volumes:
      # Override the baked-in nginx config with the local HTTP-only version
      - ./frontend/nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
