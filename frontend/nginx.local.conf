# Local development nginx config — HTTP only, no SSL.
# Used via docker-compose.local.yml which mounts this file over the
# production nginx.conf baked into the image at build time.
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React SPA — client-side routes fall back to index.html
    location / {
        try_files $uri /index.html;
    }

    # Proxy API calls to the backend container over Docker internal DNS
    location ~ ^/(predict|health) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
