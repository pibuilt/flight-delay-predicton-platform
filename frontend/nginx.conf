# Redirect all HTTP traffic to HTTPS.
# Also serves ACME webroot challenges so certbot can renew without downtime.
server {
    listen 80;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — main app server.
server {
    listen 443 ssl;
    server_name flight-predictor-pibuilt.duckdns.org;
    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate     /etc/letsencrypt/live/app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Serve the React SPA — unknown paths fall back to index.html
    # so client-side routing works correctly.
    location / {
        try_files $uri /index.html;
    }

    # Reverse-proxy API routes to the backend container.
    # "backend" resolves via Docker Compose's internal DNS — no public
    # port or external IP needed, keeping everything on the free tier.
    location ~ ^/(predict|health) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
